<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote_Interview_Practice_Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg-black: #000000;
            --cream: #EFECE3;
            --sage: #8FABD4;
            --teal: #4A70A9;
            --glass: rgba(239, 236, 227, 0.05);
            --glass-border: rgba(239, 236, 227, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-black);
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--cream);
            overflow: hidden;
        }

        /* Hero Background Image with Palette Tint */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, rgba(0,0,0,0.9), rgba(0,0,0,0.4)), 
                        url("https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=2070");
            background-size: cover;
            background-position: center;
            opacity: 0.4;
            z-index: -1;
        }

        nav {
            padding: 30px 80px;
            z-index: 10;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--sage);
            letter-spacing: -1px;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 120px;
            padding: 0 80px;
        }

        .hero-text { max-width: 550px; }

        .hero-text h1 {
            font-size: 4rem;
            line-height: 1;
            margin-bottom: 24px;
            font-weight: 800;
        }

        .hero-text p {
            font-size: 1.2rem;
            color: var(--sage);
            line-height: 1.6;
            opacity: 0.9;
        }

        /* AUTH CARD */
        .auth-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            padding: 50px;
            border-radius: 28px;
            width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7);
        }

        .tabs {
            display: flex;
            gap: 25px;
            margin-bottom: 35px;
        }

        .tab {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--sage);
            cursor: pointer;
            padding-bottom: 8px;
            position: relative;
            transition: 0.3s;
        }

        .tab.active { color: var(--cream); }
        .tab.active::after {
            content: "";
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 2px;
            background: var(--teal);
        }

        /* FORMS */
        .form-container { display: none; }
        .form-container.active { display: block; }

        .input-group { margin-bottom: 22px; }

        label {
            display: block;
            font-size: 0.8rem;
            color: var(--sage);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--cream);
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--teal);
            background: rgba(255,255,255,0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: var(--teal);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background: var(--sage);
            transform: translateY(-2px);
        }

        .helper-text {
            display: block;
            text-align: center;
            margin-top: 25px;
            font-size: 0.85rem;
            color: var(--sage);
            text-decoration: none;
            cursor: pointer;
        }

        /* TROUBLE MODAL */
        #troubleModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <nav><div class="logo"><i class="fas fa-brain"></i> InterviewPrep</div></nav>

    <main class="main-content">
        <div class="hero-text">
            <h1>Remote Interview Practice Portal</h1>
            <p>A platform that helps users practice interviews, improve skills, and build confidence anytime, anywhere.</p>
        </div>

        <div class="auth-card">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('login')">Login</div>
                <div class="tab" onclick="switchTab('register')">Register</div>
            </div>

            <!-- Login Form -->
            <div id="login-form" class="form-container active">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" placeholder="name@company.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••">
                </div>
                <button class="btn-primary" >Sign In to Dashboard</button>
            </div>

            <!-- Register Form -->
            <div id="register-form" class="form-container">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="John Doe">
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" placeholder="name@company.com">
                </div>
                <div class="input-group">
                    <label>Create Password</label>
                    <input type="password" placeholder="Min. 8 characters">
                </div>
                <button class="btn-primary">Create Free Account</button>
            </div>

            <span class="helper-text" onclick="toggleModal()">Trouble signing in?</span>
        </div>
    </main>

    <!-- Simple Modal for Help -->
    <div id="troubleModal" onclick="toggleModal()">
        <div class="auth-card" style="text-align: center;" onclick="event.stopPropagation()">
            <h2 style="margin-bottom:15px">Need help?</h2>
            <p style="color:var(--sage); margin-bottom: 20px;">Send an email to <b>support@interviewprep.io</b> or click below to reset your password.</p>
            <button class="btn-primary">Reset Password</button>
        </div>
    </div>

    <script>
        function switchTab(type) {
            // Update Tab styles
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            // Switch Forms
            document.getElementById('login-form').classList.remove('active');
            document.getElementById('register-form').classList.remove('active');
            document.getElementById(type + '-form').classList.add('active');
        }

        function toggleModal() {
            const modal = document.getElementById('troubleModal');
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        }
    </script>
</body>
</html>
