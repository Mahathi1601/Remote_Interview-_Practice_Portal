<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice - Interview Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #F5F7FA; }
          /* Navigation Bar */
        .navbar {
            background: #23465B;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
        }

        .logo img {
            height: 40px;
            object-fit: contain;
        }

        .nav-links {
            display: flex;
            gap: 35px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            transition: 0.3s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #C6C6C6;
        }
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        
        .section-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        
        h2 { color: #23465B; margin-bottom: 20px; font-size: 22px; }
        
        /* Category Selection */
        .category-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; min-height: 100px; }
        
        .category-card {
            padding: 20px;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            background: white;
        }
        .category-card i { font-size: 30px; color: #23465B; margin-bottom: 10px; display: block; }
        .category-card:hover { border-color: #23465B; background: #f8fbff; }
        .category-card.active { border-color: #23465B; background: #23465B; color: white; }
        .category-card.active i { color: white; }

        /* Status Messages */
        .status-msg { text-align: center; padding: 20px; color: #64748B; font-size: 14px; grid-column: span 3; }
        .error-msg { color: #dc3545; background: #fef2f2; border: 1px solid #fee2e2; border-radius: 8px; padding: 15px; grid-column: span 3; }

        /* Level Progression */
        .progression-map {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 30px 0;
            position: relative;
        }
        .progression-map::before {
            content: '';
            position: absolute;
            top: 25px;
            left: 10%;
            width: 80%;
            height: 4px;
            background: #E2E8F0;
            z-index: 1;
        }
        .level-node {
            width: 50px;
            height: 50px;
            background: white;
            border: 4px solid #E2E8F0;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            z-index: 2;
        }
        .level-node.unlocked { border-color: #23465B; color: #23465B; }
        .level-node.active { background: #23465B; color: white; border-color: #23465B; transform: scale(1.2); }
        .level-node.locked { background: #F1F5F9; color: #94A3B8; cursor: not-allowed; }
        .level-node .status-icon { position: absolute; bottom: -25px; font-size: 14px; width: 100px; text-align: center; color: #64748B; font-weight: 500;}

        .questions-container { display: grid; gap: 20px; margin-top: 40px; }
        .question-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-left: 5px solid #23465B;
        }
        
        .timer { float: right; background: #FFEDD5; color: #C2410C; padding: 4px 10px; border-radius: 6px; font-size: 14px; font-weight: 600; }
        .question-text { font-size: 18px; font-weight: 500; color: #23465B; margin-bottom: 15px; }
        
        textarea { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 10px; font-family: inherit; margin-bottom: 15px; }
        .btn-submit { background: #23465B; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        
        .feedback { margin-top: 20px; padding: 20px; background: #F8FAFC; border-radius: 10px; display: none; }
        
        .unlock-msg {
            background: #DCFCE7;
            color: #166534;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
            text-align: center;
            font-weight: 600;
        }
        /* Category Selection */
        .category-section {
            animation: fadeIn 0.5s ease;
        }

        .section-title {
            text-align: center;
            color: #23465B;
            margin-bottom: 3rem;
        }

        .section-title h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .section-title p {
            font-size: 1rem;
            opacity: 0.9;
        }

        .footer {
            margin-top: 30px;
            background: #2F5673;
            color: white;
            padding: 25px;
            text-align: center;
        }

        .footer a {
            color: #C6C6C6;
            margin: 0 10px;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
      <div class="navbar">
        <div class="logo">
            <img src="logo.png" alt="logo">
        </div>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="practice.html">Practice</a>
            <a href="mockinterview.html">Mock Interview</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="profile.html">Profile</a>
            <a href="login.html">Logout</a>
        </div>
    </div>

    <div class="container">
        <div id="categorySection" class="category-section">
            <div class="section-title">
                <h1><i class="fa-solid fa-pen-to-square"></i> Practice</h1>
                <p>Practice to become unstoppable.</p>
            </div>
            <div class="categories-grid" id="categoriesGrid">
                <!-- Categories loaded here -->
            </div>
        </div>
        <div class="section-box">
            <h2>Select Topic</h2>
            <div class="category-grid" id="categoryGrid">
                <div class="status-msg">Connecting to server...</div>
                <!-- Data from API -->
            </div>
        </div>

        <div id="progressionSection" class="section-box" style="display:none">
            <h2>Level Progression</h2>
            <div class="progression-map" id="levelMap">
                <div class="level-node unlocked" id="node-Easy" onclick="selectLevel('Easy')">1 <span class="status-icon">Level 1 (Easy)</span></div>
                <div class="level-node locked" id="node-Medium" onclick="selectLevel('Medium')"><i class="fas fa-lock"></i> <span class="status-icon">Level 2 (Medium)</span></div>
                <div class="level-node locked" id="node-Hard" onclick="selectLevel('Hard')"><i class="fas fa-lock"></i> <span class="status-icon">Level 3 (Hard)</span></div>
            </div>
            <p id="lockReason" style="text-align:center; font-size:13px; color:#64748B; margin-top:35px"></p>
        </div>

        <div id="unlockMsg" class="unlock-msg"></div>

        <div id="questionsContainer" class="questions-container"></div>
    </div>

    <div class="footer">
        <p>© 2026 Remote Interview Practice Portal</p>
        <div>
            <a href="#">About</a>
            <a href="#">Help Center</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Terms</a>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        const token = localStorage.getItem('token');
        let currentCategory = null;
        let currentLevel = 'Easy';
        let categories = [];

        if (!token) window.location.href = 'login.html';

        document.addEventListener('DOMContentLoaded', loadAndAutoSelect);

        async function loadAndAutoSelect() {
            console.log("Loading practice page...");
            await loadCategories();
            
            // Check for selection from Home Page
            const homeSelection = localStorage.getItem('selectedInterviewType');
            console.log("Home selection:", homeSelection);
            
            if (homeSelection && categories.length > 0) {
                const target = categories.find(c => c.name.toLowerCase() === homeSelection.toLowerCase());
                if (target) {
                    console.log("Auto-selecting category:", target.name);
                    // Find the card and click it
                    const cards = document.querySelectorAll('.category-card');
                    cards.forEach(card => {
                        if (card.innerText.trim().toLowerCase() === target.name.toLowerCase()) {
                            selectCategory(target._id, card);
                        }
                    });
                    // Clear it so it doesn't auto-select every time they refresh
                    localStorage.removeItem('selectedInterviewType');
                }
            }
        }

        async function loadCategories() {
            const grid = document.getElementById('categoryGrid');
            try {
                const res = await fetch(`${API_URL}/categories`);
                if (!res.ok) throw new Error('API Response Error');
                
                const data = await res.json();
                console.log("Loaded categories:", data);
                
                if (data.success && data.data.length > 0) {
                    categories = data.data;
                    grid.innerHTML = data.data.map(cat => `
                        <div class="category-card" onclick="selectCategory('${cat._id}', this)">
                            <i class="fas ${getIcon(cat.name)}"></i>
                            <span style="font-weight:600">${cat.name}</span>
                        </div>
                    `).join('');
                } else {
                    grid.innerHTML = '<div class="status-msg">No categories found in database. Please run seed script.</div>';
                }
            } catch (e) { 
                console.error("Fetch error:", e);
                grid.innerHTML = `
                    <div class="error-msg">
                        <strong>Connection Error!</strong><br>
                        Could not reach topics API. <br>
                        Please ensure your backend server is running on <b>http://localhost:5000</b>.
                    </div>`;
            }
        }

        function getIcon(name) {
            const n = name.toLowerCase();
            if (n.includes('technical')) return 'fa-code';
            if (n.includes('hr')) return 'fa-users';
            return 'fa-brain';
        }

        async function selectCategory(id, el) {
            currentCategory = id;
            document.querySelectorAll('.category-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('progressionSection').style.display = 'block';
            document.getElementById('unlockMsg').style.display = 'none';
            await updateProgressionStatus();
            selectLevel('Easy');
        }

        async function updateProgressionStatus() {
            try {
                const res = await fetch(`${API_URL}/practice/status/${currentCategory}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    const status = data.data;
                    const stats = status.levelStats;
                    
                    // Reset visuals
                    ['Easy', 'Medium', 'Hard'].forEach(l => {
                        const node = document.getElementById(`node-${l}`);
                        node.classList.remove('unlocked', 'locked');
                        node.innerHTML = l === 'Easy' ? '1' : (l === 'Medium' ? '2' : '3');
                    });

                    // Level 1 - Always unlocked
                    document.getElementById('node-Easy').classList.add('unlocked');
                    
                    // Level 2
                    const medNode = document.getElementById('node-Medium');
                    if (status.unlockedLevel >= 2) {
                        medNode.classList.add('unlocked');
                    } else {
                        medNode.classList.add('locked');
                        medNode.innerHTML = '<i class="fas fa-lock"></i>';
                    }

                    // Level 3
                    const hardNode = document.getElementById('node-Hard');
                    if (status.unlockedLevel >= 3) {
                        hardNode.classList.add('unlocked');
                    } else {
                        hardNode.classList.add('locked');
                        hardNode.innerHTML = '<i class="fas fa-lock"></i>';
                    }

                    // Status Text with progress
                    let reason = "";
                    if (status.unlockedLevel == 1) {
                        reason = `Level 1: ${stats.l1.attempted}/20 questions (${stats.l1.percentage}% | Avg: ${stats.l1.avgScore}%) | Need: 70% completion & 70% avg score to unlock Level 2`;
                    } else if (status.unlockedLevel == 2) {
                        reason = `Level 2: ${stats.l2.attempted}/20 questions (${stats.l2.percentage}% | Avg: ${stats.l2.avgScore}%) | Need: 50% completion & 50% avg score to unlock Level 3`;
                    } else if (status.unlockedLevel == 3) {
                        if (status.l3Completed) {
                            reason = "🎓 All levels completed! Practice session finished!";
                        } else {
                            reason = `Level 3: ${stats.l3.attempted}/20 questions (${stats.l3.percentage}% | Avg: ${stats.l3.avgScore}%) | Complete all questions to finish`;
                        }
                    }
                    document.getElementById('lockReason').innerText = reason;
                }
            } catch (e) {
                console.error("Status check fail:", e);
            }
        }

        function selectLevel(level) {
            const node = document.getElementById(`node-${level}`);
            if (node.classList.contains('locked')) return;

            currentLevel = level;
            document.querySelectorAll('.level-node').forEach(n => n.classList.remove('active'));
            node.classList.add('active');
            loadQuestions();
        }

        async function loadQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '<p class="status-msg">Loading level content...</p>';
            
            try {
                const res = await fetch(`${API_URL}/practice/by-difficulty?difficulty=${currentLevel}&categoryId=${currentCategory}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    if (data.data.length === 0) {
                        container.innerHTML = '<p class="status-msg">No questions found for this level yet.</p>';
                        return;
                    }
                    container.innerHTML = data.data.map((q, i) => `
                        <div class="question-card">
                            <span class="timer">⏳ ${q.timeLimit}s</span>
                            <div class="question-text">${i+1}. ${q.questionText}</div>
                            <textarea rows="4" id="ans-${q._id}" placeholder="Type your answer here..."></textarea>
                            <button class="btn-submit" id="btn-${q._id}" onclick="submitAnswer('${q._id}')">Submit Answer</button>
                            <div class="feedback" id="fb-${q._id}"></div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = `<div class="error-msg">${data.message}</div>`;
                }
            } catch (e) { 
                container.innerHTML = '<div class="error-msg">Server Connection Lost. Check backend.</div>';
            }
        }

        async function submitAnswer(id) {
            const answer = document.getElementById(`ans-${id}`).value;
            if (!answer.trim()) return alert('Enter answer first');
            
            const btn = document.getElementById(`btn-${id}`);
            btn.disabled = true;
            btn.innerText = 'Analyzing...';

            try {
                const res = await fetch(`${API_URL}/practice/submit`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ questionId: id, answer })
                });
                const data = await res.json();
                if (data.success) {
                    const fb = document.getElementById(`fb-${id}`);
                    fb.innerHTML = `
                        <div style="border-bottom: 1px solid #ddd; padding-bottom:10px; margin-bottom:10px">
                            <span style="font-size:20px; font-weight:700">Score: ${data.data.score}/100</span>
                        </div>
                        <p><strong>Feedback:</strong> ${data.data.feedback}</p>
                        <div style="margin-top:15px; background:#fff; padding:10px; border-radius:5px; font-size:13px">
                           <strong>Ideal Answer:</strong><br> ${data.data.idealAnswer}
                        </div>
                    `;
                    fb.style.display = 'block';
                    btn.innerText = 'Answer Evaluated';
                    
                    // Refresh progression status and check for unlocks
                    await updateProgressionStatus();
                    const statusRes = await fetch(`${API_URL}/practice/status/${currentCategory}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const statusData = await statusRes.json();
                    if (statusData.success) {
                        const stats = statusData.data;
                        if (stats.unlockedLevel === 2 && currentLevel === 'Easy') {
                            showUnlockAlert(`🎉 Great progress! Level 2 (Medium) is now UNLOCKED! (${stats.levelStats.l1.attempted}/20 questions, ${stats.levelStats.l1.avgScore}% avg)`);
                        } else if (stats.unlockedLevel === 3 && currentLevel === 'Medium') {
                            showUnlockAlert(`🔥 Excellent! Level 3 (Hard) is now UNLOCKED! (${stats.levelStats.l2.attempted}/20 questions, ${stats.levelStats.l2.avgScore}% avg)`);
                        } else if (stats.l3Completed && currentLevel === 'Hard') {
                            showUnlockAlert('🏆 All questions completed! Practice session finished! Congratulations!');
                        }
                    }
                }
            } catch (e) { 
                console.error('Submission error:', e);
                alert('Submission error'); 
                btn.disabled = false; 
                btn.innerText='Submit Answer'; 
            }
        }

        function showUnlockAlert(text) {
            const msg = document.getElementById('unlockMsg');
            msg.innerText = text;
            msg.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
