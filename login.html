<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Interview Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#F5F7FA;
}

.navbar{
    background:#23465B;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 50px;
}

.logo{
    font-size:20px;
    font-weight:600;
    height : 50px;

}

.nav-links{
    display:flex;
    gap:35px;
}

.nav-links a{
    color:white;
    text-decoration:none;
    font-size:16px;
    transition:0.3s;
}

.nav-links a:hover{
    color:#C6C6C6;;
}

.container{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:60px 20px;
    gap:60px;
}

.left{
    max-width:450px;
}

.left h1{
    font-size:38px;
    color:#23465B;
    line-height:1.2;
}

.left p{
    margin-top:15px;
    color:#64748B;
}

.auth-box{
    width:380px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.tabs{
    display:flex;
    gap:20px;
    margin-bottom:25px;
}

.tabs span{
    cursor:pointer;
    color:#64748B;
    font-weight:500;
}

.tabs .active{
    color:#23465B;
    border-bottom:2px solid #23465B;
    padding-bottom:5px;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    font-size:13px;
    color:#56738A;
    display:block;
    margin-bottom:6px;
}

.input-group input{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ddd;
    outline:none;
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#23465B;
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    background:#2F5673;
}

.extra{
    margin-top:12px;
    text-align:center;
    font-size:13px;
    color:#64748B;
}

.hidden{
    display:none;
}
.footer{
    margin-top:30px;
    background:#2F5673;
    color:white;
    padding:25px;
    text-align:center;
}

.footer a{
    color:#C6C6C6;
    margin:0 10px;
    text-decoration:none;
    font-size:14px;
}

.logo img{
    height:40px;
    object-fit:contain;
}
.extra a{
    color:#64748B;
    text-decoration:none;
    font-weight:500;
    transition:0.3s;
}

.extra a:hover{
    color:#23465B; 
}
.extra{
    cursor:pointer;   
}

</style>
</head>

<body>

<div class="navbar">
    <div class="logo">
        <img src="logo.png">
    </div>

    <div class="nav-links">
        <!--
            <a href="home.html">Home</a>
            <a href="practice.html" class="active">Practice</a>
            <a href="mockinterview.html">Mock Interview</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="profile.html">Profile</a>
    -->
            <a href="login.html">Login</a>
        </div>
</div>

<div class="container">

    <div class="left">
        <h1>Remote Interview Practice Portal</h1>
        <p>A platform that helps users practice interviews, improve skills, and build confidence anytime, anywhere.</p>
    </div>

    <div class="auth-box">

        <div class="tabs">
            <span class="tab active" onclick="showLogin()">Login</span>
            <span class="tab" onclick="showRegister()">Register</span>
        </div>

        <div id="loginForm">
            <div class="input-group">
                <label>EMAIL</label>
                <input type="email" id="loginEmail" placeholder="Enter email">
            </div>

            <div class="input-group">
                <label>PASSWORD</label>
                <input type="password" id="loginPassword" placeholder="Enter password">
            </div>

            <button class="btn" id="loginBtn">Login</button>
            <div class="extra"><a href="forgot-password.html">Trouble signing in?</a></div>
        </div>

        <div id="registerForm" class="hidden">

            <div class="input-group">
                <label>FULL NAME</label>
                <input type="text" id="registerName" placeholder="Enter name">
            </div>

            <div class="input-group">
                <label>EMAIL</label>
                <input type="email" id="registerEmail" placeholder="Enter email">
            </div>

            <div class="input-group">
                <label>PASSWORD</label>
                <input type="password" id="registerPassword" placeholder="Min 6 characters">
            </div>

            <button class="btn" id="registerBtn">Create Account</button>
            <div class="extra" onclick="showLogin()">Already have an account?</div>
        </div>

    </div>

</div>

<div class="footer">
    <p>© 2026 Remote Interview Practice Portal</p>
    <div>
        <a href="#">About</a>
        <a href="#">Help Center</a>
        <a href="#">Privacy Policy</a>
        <a href="#">Terms</a>
    </div>
</div>

<script>
function showLogin(){
    document.getElementById("loginForm").classList.remove("hidden");
    document.getElementById("registerForm").classList.add("hidden");

    document.querySelectorAll(".tab")[0].classList.add("active");
    document.querySelectorAll(".tab")[1].classList.remove("active");
}

function showRegister(){
    document.getElementById("loginForm").classList.add("hidden");
    document.getElementById("registerForm").classList.remove("hidden");

    document.querySelectorAll(".tab")[1].classList.add("active");
    document.querySelectorAll(".tab")[0].classList.remove("active");
}

// BACKEND CONNECTION CODE
const API_URL = 'http://localhost:5000/api';

// Login
document.getElementById('loginBtn').addEventListener('click', async () => {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    
    if (!email || !password) {
        alert('Please enter email and password');
        return;
    }
    
    try {
        const response = await fetch(`${API_URL}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        
        if (data.success) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            alert('Login successful!');
            window.location.href = 'home.html';
        } else {
            alert(data.message || 'Login failed');
        }
    } catch (error) {
        alert('Cannot connect to server. Make sure backend is running on port 5000');
    }
});

// Register
document.getElementById('registerBtn').addEventListener('click', async () => {
    const name = document.getElementById('registerName').value;
    const email = document.getElementById('registerEmail').value;
    const password = document.getElementById('registerPassword').value;
    
    if (!name || !email || !password) {
        alert('Please fill all fields');
        return;
    }
    
    if (password.length < 6) {
        alert('Password must be at least 6 characters');
        return;
    }
    
    try {
        const response = await fetch(`${API_URL}/auth/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password })
        });
        
        const data = await response.json();
        
        if (data.success) {
            alert('Registration successful! Please login.');
            showLogin();
            // Clear form
            document.getElementById('registerName').value = '';
            document.getElementById('registerEmail').value = '';
            document.getElementById('registerPassword').value = '';
        } else {
            alert(data.message || 'Registration failed');
        }
    } catch (error) {
        alert('Cannot connect to server. Make sure backend is running on port 5000');
    }
});
</script>

</body>
</html>
